name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 10 minutes to prevent the Render free tier from sleeping
    - cron: '*/10 * * * *'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend API
        run: curl -s -o /dev/null -w "%{http_code}" https://inventory-management-system-tbza.onrender.com/
      
      - name: Ping Vercel Frontend
        run: curl -s -o /dev/null -w "%{http_code}" https://inventory-management-system-8d9e.vercel.app/
